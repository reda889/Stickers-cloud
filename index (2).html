<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>☁ Stickers Cloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design Tokens ────────────────────────── */
    :root {
      --bg-base:        #08080e;
      --bg-surface:     #0f0f17;
      --bg-card:        #14141e;
      --bg-card-hover:  #1b1b28;
      --accent:         #7c5cfc;
      --accent-alt:     #6366f1;
      --accent-light:   #a78bfa;
      --accent-dim:     rgba(124, 92, 252, 0.12);
      --accent-glow:    rgba(124, 92, 252, 0.30);
      --text-1:         #f0eeff;
      --text-2:         #9894b8;
      --text-3:         #55527a;
      --success:        #34d399;
      --error:          #f87171;
      --border:         rgba(255,255,255,0.065);
      --border-hover:   rgba(124,92,252,0.35);
      --r-sm:  8px;
      --r-md:  12px;
      --r-lg:  18px;
      --r-xl:  24px;
      --ease:  0.2s ease;
      --f-display: 'Space Grotesk', sans-serif;
      --f-body:    'DM Sans', sans-serif;
      --f-mono:    'JetBrains Mono', monospace;
    }

    html { -webkit-font-smoothing: antialiased; }

    body {
      background: var(--bg-base);
      color: var(--text-1);
      font-family: var(--f-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 45% at 15% 5%,  rgba(124,92,252,.07) 0%, transparent 65%),
        radial-gradient(ellipse 55% 40% at 85% 90%, rgba(99,102,241,.05)  0%, transparent 65%);
    }

    /* ── Layout ───────────────────────────────── */
    .wrap { max-width: 1180px; margin: 0 auto; padding: 0 22px; position: relative; z-index: 1; }

    /* ── Scrollbar ────────────────────────────── */
    ::-webkit-scrollbar          { width: 5px; }
    ::-webkit-scrollbar-track    { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb    { background: var(--bg-card-hover); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

    /* ── Focus ────────────────────────────────── */
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ── Reduced Motion ───────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }

    /* ══════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════ */
    .site-header {
      padding: 22px 0 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 30px;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    /* Logo */
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--f-display); font-weight: 700; font-size: 1.3rem;
      color: var(--text-1); text-decoration: none; user-select: none;
    }
    .logo-mark {
      width: 35px; height: 35px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-alt) 100%);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      box-shadow: 0 0 18px var(--accent-glow);
    }
    .logo-sub {
      font-size: .68rem; font-weight: 500; color: var(--text-3);
      font-family: var(--f-mono); display: block; letter-spacing: .06em;
      margin-top: 1px;
    }

    /* ── Token Bar ──────────────────────────── */
    .token-bar {
      display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    }
    .token-input {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text-1);
      font-family: var(--f-mono); font-size: .78rem;
      padding: 8px 11px;
      width: 230px; max-width: 100%;
      outline: none;
      transition: border-color var(--ease), box-shadow var(--ease);
    }
    .token-input:focus {
      border-color: var(--border-hover);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .token-input::placeholder { color: var(--text-3); }

    .token-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .72rem; font-weight: 500; padding: 4px 9px;
      border-radius: 20px; white-space: nowrap;
    }
    .token-badge.ok  { color: var(--success); background: rgba(52,211,153,.08); border: 1px solid rgba(52,211,153,.18); }
    .token-badge.off { color: var(--text-3);  background: transparent;          border: 1px solid var(--border); }

    /* ══════════════════════════════════════════
       BUTTONS (shared)
    ══════════════════════════════════════════ */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      border: none; border-radius: var(--r-sm); cursor: pointer;
      font-family: var(--f-body); font-weight: 500; font-size: .875rem;
      padding: 8px 16px; transition: all var(--ease); white-space: nowrap;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; pointer-events: none; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-alt));
      color: #fff; box-shadow: 0 2px 14px var(--accent-glow);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 22px var(--accent-glow); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent; color: var(--text-2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg-surface); color: var(--text-1); border-color: var(--border-hover); }

    .btn-danger {
      background: rgba(248,113,113,.08); color: var(--error);
      border: 1px solid rgba(248,113,113,.18);
    }
    .btn-danger:hover { background: rgba(248,113,113,.18); }

    .btn-sm { padding: 6px 12px; font-size: .8rem; }
    .btn-icon { padding: 6px; width: 32px; height: 32px; border-radius: 7px; }

    /* ══════════════════════════════════════════
       UPLOAD PANEL
    ══════════════════════════════════════════ */
    .upload-panel {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 26px 28px;
      margin-bottom: 34px;
    }
    .panel-label {
      font-family: var(--f-display); font-size: .72rem; font-weight: 600;
      color: var(--text-3); text-transform: uppercase; letter-spacing: .1em;
      margin-bottom: 16px;
    }

    /* Drop zone */
    .drop-zone {
      position: relative;
      border: 2px dashed var(--border);
      border-radius: var(--r-lg);
      padding: 38px 20px;
      text-align: center;
      cursor: pointer;
      background: var(--bg-card);
      transition: border-color var(--ease), background var(--ease), box-shadow var(--ease);
    }
    .drop-zone:hover { border-color: var(--accent); background: var(--accent-dim); }
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 0 0 4px var(--accent-dim), inset 0 0 30px var(--accent-dim);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon { font-size: 2.2rem; display: block; margin-bottom: 10px; }
    .drop-title {
      font-family: var(--f-display); font-weight: 600; font-size: .98rem;
      color: var(--text-1); margin-bottom: 5px;
    }
    .drop-hint { font-size: .82rem; color: var(--text-3); }
    .drop-hint em { color: var(--accent-light); font-style: normal; font-weight: 500; }

    /* Preview row */
    .preview-row {
      display: none; align-items: center; gap: 13px;
      margin-top: 14px; padding: 12px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
    }
    .preview-row.show { display: flex; }
    .preview-thumb {
      width: 52px; height: 52px; object-fit: cover;
      border-radius: 8px; flex-shrink: 0; background: var(--bg-base);
    }
    .preview-meta { flex: 1; min-width: 0; }
    .preview-name {
      font-family: var(--f-mono); font-size: .82rem; font-weight: 500; color: var(--text-1);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .preview-size { font-size: .75rem; color: var(--text-3); margin-top: 3px; }

    /* Controls */
    .upload-controls { display: flex; align-items: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }

    .upload-msg {
      font-size: .82rem; padding: 8px 12px; border-radius: var(--r-sm);
      display: none; align-items: center; gap: 7px;
    }
    .upload-msg.show    { display: inline-flex; }
    .upload-msg.success { color: var(--success); background: rgba(52,211,153,.08); }
    .upload-msg.error   { color: var(--error);   background: rgba(248,113,113,.08); }
    .upload-msg.loading { color: var(--accent-light); background: var(--accent-dim); }

    /* ══════════════════════════════════════════
       GALLERY SECTION
    ══════════════════════════════════════════ */
    .gallery-section { margin-bottom: 70px; }

    .gallery-topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 18px; flex-wrap: wrap;
    }
    .gallery-heading {
      display: flex; align-items: center; gap: 10px;
    }
    .gallery-title {
      font-family: var(--f-display); font-weight: 700; font-size: 1.45rem; color: var(--text-1);
    }
    .gallery-badge {
      font-size: .72rem; font-weight: 500; color: var(--text-3);
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 3px 10px;
    }

    /* ── Grid ─────────────────────────────────── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
      gap: 13px;
    }

    /* Skeleton */
    .skel {
      border-radius: var(--r-md);
      aspect-ratio: 1;
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
    }
    @keyframes shimmer {
      0%   { background-position:  200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Gallery card */
    .g-card {
      position: relative; border-radius: var(--r-md); overflow: hidden;
      background: var(--bg-card); border: 1px solid var(--border);
      aspect-ratio: 1; cursor: pointer;
      transition: transform var(--ease), box-shadow var(--ease), border-color var(--ease);
    }
    .g-card:hover {
      transform: translateY(-3px) scale(1.012);
      box-shadow: 0 10px 34px rgba(0,0,0,.45), 0 0 0 1px var(--border-hover);
      border-color: var(--border-hover);
      z-index: 2;
    }
    .g-card img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: filter var(--ease);
    }
    .g-card:hover img { filter: brightness(.65) saturate(.9); }

    /* Action buttons — top-left */
    .g-actions {
      position: absolute; top: 8px; left: 8px;
      display: flex; gap: 5px;
      opacity: 0; transform: translateY(-5px);
      transition: opacity var(--ease), transform var(--ease);
    }
    .g-card:hover .g-actions { opacity: 1; transform: translateY(0); }

    .g-btn {
      width: 30px; height: 30px; border-radius: 7px; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
      transition: background var(--ease), color var(--ease), border-color var(--ease), transform .12s ease;
    }
    .g-btn:hover { transform: scale(1.08); }
    .g-btn:active { transform: scale(.95); }

    .g-btn-copy {
      background: rgba(10,10,20,.82); color: #ddd;
      border: 1px solid rgba(255,255,255,.12);
    }
    .g-btn-copy:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .g-btn-copy.copied { background: var(--success); color: #fff; border-color: var(--success); }

    .g-btn-del {
      background: rgba(10,10,20,.82); color: var(--error);
      border: 1px solid rgba(248,113,113,.18);
    }
    .g-btn-del:hover { background: var(--error); color: #fff; border-color: var(--error); }

    /* Filename strip — bottom */
    .g-name {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 20px 9px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,.72));
      font-size: .68rem; font-family: var(--f-mono); color: rgba(255,255,255,.65);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      opacity: 0; transform: translateY(4px);
      transition: opacity var(--ease), transform var(--ease);
    }
    .g-card:hover .g-name { opacity: 1; transform: translateY(0); }

    /* Always-visible actions on touch devices */
    @media (hover: none) {
      .g-actions { opacity: 1; transform: translateY(0); }
      .g-name    { opacity: 1; transform: translateY(0); }
      .g-card img { filter: brightness(.82); }
    }

    /* ── Empty / Error ────────────────────────── */
    .g-empty {
      grid-column: 1 / -1; text-align: center;
      padding: 60px 20px; color: var(--text-3);
    }
    .g-empty-icon { font-size: 2.8rem; display: block; margin-bottom: 14px; opacity: .4; }
    .g-empty p   { font-size: .9rem; line-height: 1.6; }
    .g-empty code {
      font-family: var(--f-mono); font-size: .78rem;
      color: var(--accent-light); background: var(--accent-dim);
      padding: 2px 6px; border-radius: 4px;
    }

    /* ══════════════════════════════════════════
       SPINNER
    ══════════════════════════════════════════ */
    .spinner {
      width: 15px; height: 15px; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,.15);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin .55s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════════
       LIGHTBOX
    ══════════════════════════════════════════ */
    .lightbox {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.9); backdrop-filter: blur(14px);
      display: none; align-items: center; justify-content: center;
      padding: 20px; cursor: zoom-out;
    }
    .lightbox.open { display: flex; }

    .lb-inner {
      position: relative;
      max-width: min(92vw, 960px);
      max-height: 88vh;
      cursor: default;
      animation: lbIn .22s ease;
    }
    @keyframes lbIn {
      from { opacity: 0; transform: scale(.94); }
      to   { opacity: 1; transform: scale(1); }
    }
    .lb-inner img {
      max-width: 100%; max-height: 88vh; object-fit: contain;
      border-radius: var(--r-md); display: block;
      box-shadow: 0 28px 80px rgba(0,0,0,.65);
    }
    .lb-close {
      position: absolute; top: -13px; right: -13px;
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--bg-surface); border: 1px solid var(--border);
      color: var(--text-2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; transition: all var(--ease);
    }
    .lb-close:hover { background: var(--error); color: #fff; border-color: var(--error); }

    .lb-filename {
      position: absolute; bottom: -28px; left: 0; right: 0;
      text-align: center; font-family: var(--f-mono); font-size: .72rem;
      color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ══════════════════════════════════════════
       DELETE MODAL
    ══════════════════════════════════════════ */
    .modal-bg {
      position: fixed; inset: 0; z-index: 900;
      background: rgba(0,0,0,.68); backdrop-filter: blur(7px);
      display: none; align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }

    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 28px 28px 24px;
      max-width: 370px; width: calc(100% - 36px);
      box-shadow: 0 26px 64px rgba(0,0,0,.55);
      animation: modalIn .2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(.95) translateY(6px); }
      to   { opacity: 1; transform: scale(1)  translateY(0); }
    }
    .modal-icon  { font-size: 2rem; margin-bottom: 13px; }
    .modal-title {
      font-family: var(--f-display); font-weight: 600; font-size: 1.05rem;
      color: var(--text-1); margin-bottom: 7px;
    }
    .modal-desc  { font-size: .875rem; color: var(--text-2); line-height: 1.55; margin-bottom: 7px; }
    .modal-file  {
      font-family: var(--f-mono); font-size: .75rem; color: var(--text-3);
      word-break: break-all; margin-bottom: 22px;
    }
    .modal-btns  { display: flex; gap: 9px; justify-content: flex-end; }

    /* ══════════════════════════════════════════
       TOASTS
    ══════════════════════════════════════════ */
    .toast-wrap {
      position: fixed; top: 18px; right: 18px; z-index: 2000;
      display: flex; flex-direction: column; gap: 7px;
      pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: 9px;
      padding: 11px 15px; border-radius: var(--r-md);
      font-size: .85rem; font-weight: 500;
      pointer-events: all; max-width: 300px;
      backdrop-filter: blur(16px);
      box-shadow: 0 6px 28px rgba(0,0,0,.4);
      animation: tIn .28s ease both;
    }
    .toast-icon { flex-shrink: 0; font-size: .95rem; }
    @keyframes tIn  { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes tOut { from { opacity: 1; transform: translateX(0);    } to { opacity: 0; transform: translateX(12px); } }
    .toast.out { animation: tOut .28s ease both; }

    .toast-success { color: var(--success); background: rgba(8,24,18,.93); border: 1px solid rgba(52,211,153,.22); }
    .toast-error   { color: var(--error);   background: rgba(24,8,8,.93);  border: 1px solid rgba(248,113,113,.22); }
    .toast-info    { color: var(--accent-light); background: rgba(8,8,22,.93); border: 1px solid rgba(124,92,252,.22); }

    /* ══════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════ */
    @media (max-width: 640px) {
      .header-inner  { flex-direction: column; align-items: flex-start; }
      .token-bar     { width: 100%; }
      .token-input   { flex: 1; width: auto; }
      .gallery-grid  { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
      .upload-panel  { padding: 18px 16px; }
      .drop-zone     { padding: 28px 14px; }
    }
    @media (max-width: 380px) {
      .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 8px; }
    }
  </style>
</head>
<body>

<!-- ── Toast container ──────────────────────── -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- ── Delete modal ─────────────────────────── -->
<div class="modal-bg" id="delModal" role="dialog" aria-modal="true" aria-labelledby="delTitle">
  <div class="modal">
    <div class="modal-icon">🗑️</div>
    <h2 class="modal-title" id="delTitle">Delete this image?</h2>
    <p class="modal-desc">This permanently removes the file from your repository. It cannot be undone.</p>
    <p class="modal-file" id="delFilename"></p>
    <div class="modal-btns">
      <button class="btn btn-ghost btn-sm" id="delCancelBtn">Cancel</button>
      <button class="btn btn-danger btn-sm" id="delConfirmBtn">Delete</button>
    </div>
  </div>
</div>

<!-- ── Lightbox ──────────────────────────────── -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <div class="lb-inner">
    <img id="lbImg" src="" alt="" />
    <button class="lb-close" id="lbClose" aria-label="Close preview">✕</button>
    <p class="lb-filename" id="lbFilename"></p>
  </div>
</div>

<!-- ══════════════════════════════════════════
     HEADER
══════════════════════════════════════════ -->
<header class="site-header">
  <div class="wrap">
    <div class="header-inner">

      <div class="logo">
        <div class="logo-mark">☁</div>
        <div>
          Stickers Cloud
          <span class="logo-sub">reda889 / Stickers-cloud</span>
        </div>
      </div>

      <div class="token-bar">
        <input
          type="password"
          class="token-input"
          id="tokenInput"
          placeholder="Paste GitHub Personal Access Token…"
          autocomplete="off"
          spellcheck="false"
          aria-label="GitHub Personal Access Token"
        />
        <button class="btn btn-primary btn-sm" id="saveTokenBtn">Save</button>
        <button class="btn btn-ghost  btn-sm" id="clearTokenBtn">Clear</button>
        <span class="token-badge off" id="tokenBadge">○ No token</span>
      </div>

    </div>
  </div>
</header>

<!-- ══════════════════════════════════════════
     MAIN
══════════════════════════════════════════ -->
<main>
  <div class="wrap">

    <!-- ── Upload Panel ─────────────────────── -->
    <section class="upload-panel" aria-label="Upload image">
      <p class="panel-label">Upload Image</p>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*" aria-label="Choose image file" />
        <span class="drop-icon">📎</span>
        <p class="drop-title">Drop an image here</p>
        <p class="drop-hint">or <em>browse</em> to pick a file &nbsp;·&nbsp; PNG, JPG, GIF, WEBP…</p>
      </div>

      <!-- Preview -->
      <div class="preview-row" id="previewRow">
        <img class="preview-thumb" id="previewThumb" src="" alt="Preview" />
        <div class="preview-meta">
          <p class="preview-name" id="previewName">—</p>
          <p class="preview-size" id="previewSize">—</p>
        </div>
        <button class="btn btn-ghost btn-sm" id="clearFileBtn" style="flex-shrink:0">✕</button>
      </div>

      <!-- Controls -->
      <div class="upload-controls">
        <button class="btn btn-primary" id="uploadBtn" disabled aria-label="Upload to GitHub">
          <!-- upload icon -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
          Upload to GitHub
        </button>
        <div class="upload-msg" id="uploadMsg" role="status" aria-live="polite"></div>
      </div>
    </section>

    <!-- ── Gallery ───────────────────────────── -->
    <section class="gallery-section" aria-label="Image gallery">
      <div class="gallery-topbar">
        <div class="gallery-heading">
          <h2 class="gallery-title">Gallery</h2>
          <span class="gallery-badge" id="galleryBadge" aria-live="polite">–</span>
        </div>
        <button class="btn btn-ghost btn-sm" id="refreshBtn" aria-label="Refresh gallery">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
          Refresh
        </button>
      </div>

      <div class="gallery-grid" id="galleryGrid" role="list">
        <!-- Populated by JS -->
      </div>
    </section>

  </div><!-- /wrap -->
</main>


<script>
/* ═══════════════════════════════════════════════════════
   CONFIG  — Never put your PAT here. Use the input above.
═══════════════════════════════════════════════════════ */
const CFG = {
  owner:  'reda889',
  repo:   'Stickers-cloud',
  folder: 'images/',
  branch: 'main',
};
const API = 'https://api.github.com';
const LS_KEY = 'sc_gh_pat';

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
let selectedFile    = null;
let pendingDelete   = null;   // { filename, sha }
let detectedBranch  = null;   // resolved once, then cached

/* ═══════════════════════════════════════════════════════
   DOM REFS
═══════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const tokenInput    = $('tokenInput');
const saveTokenBtn  = $('saveTokenBtn');
const clearTokenBtn = $('clearTokenBtn');
const tokenBadge    = $('tokenBadge');

const dropZone      = $('dropZone');
const fileInput     = $('fileInput');
const previewRow    = $('previewRow');
const previewThumb  = $('previewThumb');
const previewName   = $('previewName');
const previewSize   = $('previewSize');
const clearFileBtn  = $('clearFileBtn');
const uploadBtn     = $('uploadBtn');
const uploadMsg     = $('uploadMsg');

const galleryGrid   = $('galleryGrid');
const galleryBadge  = $('galleryBadge');
const refreshBtn    = $('refreshBtn');

const lightbox      = $('lightbox');
const lbImg         = $('lbImg');
const lbClose       = $('lbClose');
const lbFilename    = $('lbFilename');

const delModal      = $('delModal');
const delFilename   = $('delFilename');
const delCancelBtn  = $('delCancelBtn');
const delConfirmBtn = $('delConfirmBtn');

/* ═══════════════════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════════════════ */
function esc(str) {
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

function fmtBytes(b) {
  if (b < 1024)        return `${b} B`;
  if (b < 1024 * 1024) return `${(b / 1024).toFixed(1)} KB`;
  return `${(b / (1024 * 1024)).toFixed(2)} MB`;
}

function isImageFile(name) {
  return /\.(png|jpe?g|gif|webp|svg|bmp|ico|avif|tiff?)$/i.test(name);
}

/* Auto-detect the repo's default branch (main / master / etc.)
   Result is cached so it's only fetched once per session.        */
async function getDefaultBranch() {
  if (detectedBranch) return detectedBranch;
  const token = getToken();
  const hdrs  = { 'X-GitHub-Api-Version': '2022-11-28' };
  if (token) hdrs['Authorization'] = `Bearer ${token}`;
  try {
    const res = await fetch(`${API}/repos/${CFG.owner}/${CFG.repo}`, { headers: hdrs });
    if (res.ok) {
      const d = await res.json();
      detectedBranch = d.default_branch || CFG.branch;
      /* Update visible subtitle so user knows which branch is active */
      const sub = document.querySelector('.logo-sub');
      if (sub) sub.textContent = `reda889 / Stickers-cloud  ·  branch: ${detectedBranch}`;
      return detectedBranch;
    }
  } catch { /* fall through */ }
  detectedBranch = CFG.branch;
  return detectedBranch;
}

/* ═══════════════════════════════════════════════════════
   TOKEN MANAGEMENT
═══════════════════════════════════════════════════════ */
function getToken() { return localStorage.getItem(LS_KEY) || ''; }

function refreshTokenUI() {
  const has = !!getToken();
  tokenBadge.textContent = has ? '● Token saved' : '○ No token';
  tokenBadge.className   = `token-badge ${has ? 'ok' : 'off'}`;
  tokenInput.value       = '';
  tokenInput.placeholder = has
    ? 'Token saved — paste a new one to replace'
    : 'Paste GitHub Personal Access Token…';
}

saveTokenBtn.addEventListener('click', () => {
  const val = tokenInput.value.trim();
  if (!val) { showToast('Paste your PAT first.', 'error'); return; }
  localStorage.setItem(LS_KEY, val);
  refreshTokenUI();
  showToast('Token saved to localStorage.', 'success');
  fetchGallery();
});

clearTokenBtn.addEventListener('click', () => {
  localStorage.removeItem(LS_KEY);
  tokenInput.value = '';
  refreshTokenUI();
  showToast('Token cleared.', 'info');
});

tokenInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveTokenBtn.click(); });

/* ═══════════════════════════════════════════════════════
   FILE SELECTION & PREVIEW
═══════════════════════════════════════════════════════ */
function handleFile(file) {
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    showToast('Please pick a valid image file.', 'error'); return;
  }
  selectedFile = file;
  uploadBtn.disabled = false;

  const reader = new FileReader();
  reader.onload = e => { previewThumb.src = e.target.result; };
  reader.readAsDataURL(file);

  previewName.textContent = file.name;
  previewSize.textContent = fmtBytes(file.size);
  previewRow.classList.add('show');
  setMsg('', '');
}

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

clearFileBtn.addEventListener('click', () => {
  selectedFile = null;
  fileInput.value = '';
  previewRow.classList.remove('show');
  uploadBtn.disabled = true;
  setMsg('', '');
});

/* ── Drag & Drop ──────────────────────────── */
['dragenter', 'dragover'].forEach(ev =>
  dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('drag-over'); })
);
['dragleave', 'drop'].forEach(ev =>
  dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('drag-over'); })
);
dropZone.addEventListener('drop', e => handleFile(e.dataTransfer.files[0]));

/* ═══════════════════════════════════════════════════════
   UPLOAD STATUS HELPERS
═══════════════════════════════════════════════════════ */
function setMsg(text, type) {
  if (!text) {
    uploadMsg.className = 'upload-msg';
    uploadMsg.innerHTML = '';
    return;
  }
  uploadMsg.className = `upload-msg show ${type}`;
  uploadMsg.innerHTML = type === 'loading'
    ? `<span class="spinner"></span><span>${esc(text)}</span>`
    : esc(text);
}

/* ═══════════════════════════════════════════════════════
   UPLOAD  →  GitHub REST API  PUT
═══════════════════════════════════════════════════════ */
uploadBtn.addEventListener('click', doUpload);

async function doUpload() {
  const token = getToken();
  if (!token)        { showToast('Save a GitHub PAT before uploading.', 'error'); return; }
  if (!selectedFile) { showToast('No file selected.', 'error');                   return; }

  /* Convert to Base64 — strip the data-URI header */
  const b64 = await toBase64(selectedFile);

  /* Unique filename */
  const ext  = selectedFile.name.split('.').pop().toLowerCase();
  const name = `img_${Date.now()}.${ext}`;
  const path = `${CFG.folder}${name}`;
  const url  = `${API}/repos/${CFG.owner}/${CFG.repo}/contents/${path}`;

  /* UI: loading */
  uploadBtn.disabled = true;
  uploadBtn.innerHTML = `<span class="spinner"></span> Uploading…`;
  setMsg('Uploading to GitHub…', 'loading');

  /* Resolve branch first */
  const branch = await getDefaultBranch();

  try {
    const res  = await fetch(url, {
      method: 'PUT',
      headers: authHeaders(token),
      body: JSON.stringify({
        message: `Upload ${name}`,
        content: b64,
        branch:  branch,
      }),
    });
    const data = await res.json();

    if (res.ok) {
      setMsg(`✓ Saved as ${name}`, 'success');
      showToast(`${name} uploaded successfully!`, 'success');
      clearFileBtn.click();
      /* Refresh gallery — wait for GitHub API cache to propagate */
      setMsg('⏳ Waiting for GitHub to index the file…', 'loading');
      setTimeout(() => { setMsg('', ''); fetchGallery(); }, 3000);
    } else {
      const errMsg = data.message || 'Unknown error';
      setMsg(`Upload failed: ${errMsg}`, 'error');
      showToast(`Upload failed: ${errMsg}`, 'error');
    }
  } catch (err) {
    setMsg(`Network error: ${err.message}`, 'error');
    showToast('Network error. Check your connection.', 'error');
  } finally {
    uploadBtn.disabled = false;
    uploadBtn.innerHTML = `
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
      </svg>
      Upload to GitHub`;
  }
}

/* FileReader → pure Base64 (no data-URI prefix) */
function toBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload  = e => resolve(e.target.result.split(',')[1]);
    r.onerror = ()  => reject(new Error('FileReader failed'));
    r.readAsDataURL(file);
  });
}

/* ═══════════════════════════════════════════════════════
   FETCH GALLERY  →  GitHub REST API  GET
═══════════════════════════════════════════════════════ */
refreshBtn.addEventListener('click', () => { fetchGallery(); showToast('Gallery refreshed.', 'info'); });

async function fetchGallery() {
  const token  = getToken();
  const branch = await getDefaultBranch();

  /* Strip trailing slash, add ?ref= for explicit branch + timestamp to bust
     both browser cache and GitHub's CDN/API cache layer.                      */
  const cleanPath = CFG.folder.replace(/\/$/, '');
  const url = `${API}/repos/${CFG.owner}/${CFG.repo}/contents/${cleanPath}?ref=${branch}&_=${Date.now()}`;

  /* Spinning refresh icon */
  const origRefresh = refreshBtn.innerHTML;
  refreshBtn.disabled = true;
  refreshBtn.innerHTML = `<span class="spinner" style="width:13px;height:13px;border-width:2px"></span> Refresh`;

  showSkeletons(12);

  const headers = { 'X-GitHub-Api-Version': '2022-11-28' };
  if (token) headers['Authorization'] = `Bearer ${token}`;

  try {
    /* cache: 'no-store' tells the browser never to serve a cached response */
    const res  = await fetch(url, { headers, cache: 'no-store' });
    const data = await res.json();

    if (!res.ok) {
      const msg = data.message || 'Could not load gallery';
      showGalleryMsg(
        '⚠️',
        `<span style="color:var(--error)">${esc(msg)}</span>`,
        `Branch: <code>${branch}</code> · Make sure the <code>images/</code> folder exists and your token has <code>repo</code> scope.`
      );
      galleryBadge.textContent = '–';
      return;
    }

    if (!Array.isArray(data)) {
      showGalleryMsg('🖼️', 'No images yet.', 'Upload your first sticker above!');
      galleryBadge.textContent = '0 images';
      return;
    }

    const images = data.filter(f => f.type === 'file' && isImageFile(f.name));
    renderGallery(images);

  } catch (err) {
    showGalleryMsg('⚠️', `<span style="color:var(--error)">Network error</span>`, esc(err.message));
    galleryBadge.textContent = '–';
  } finally {
    refreshBtn.disabled = false;
    refreshBtn.innerHTML = origRefresh;
  }
}

/* ── Skeleton placeholders ─────────────────── */
function showSkeletons(n = 12) {
  galleryGrid.innerHTML = Array(n).fill('<div class="skel" role="presentation"></div>').join('');
}

/* ── Empty / error state ───────────────────── */
function showGalleryMsg(icon, line1, line2 = '') {
  galleryGrid.innerHTML = `
    <div class="g-empty" role="status">
      <span class="g-empty-icon">${icon}</span>
      <p>${line1}</p>
      ${line2 ? `<p style="margin-top:6px;font-size:.8rem">${line2}</p>` : ''}
    </div>`;
}

/* ── Render gallery cards ──────────────────── */
function renderGallery(images) {
  const n = images.length;
  galleryBadge.textContent = `${n} image${n !== 1 ? 's' : ''}`;

  if (n === 0) {
    showGalleryMsg('🖼️', 'No images yet.', 'Upload your first sticker above!');
    return;
  }

  galleryGrid.innerHTML = '';

  images.forEach(item => {
    const card = document.createElement('div');
    card.className    = 'g-card';
    card.setAttribute('role', 'listitem');
    card.setAttribute('aria-label', item.name);

    card.innerHTML = `
      <img
        src="${esc(item.download_url)}"
        alt="${esc(item.name)}"
        loading="lazy"
        decoding="async"
      />

      <!-- Action buttons — top-left corner -->
      <div class="g-actions">

        <!-- Copy raw URL -->
        <button
          class="g-btn g-btn-copy"
          title="Copy raw URL"
          aria-label="Copy URL for ${esc(item.name)}"
          data-url="${esc(item.download_url)}"
        >
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>

        <!-- Delete -->
        <button
          class="g-btn g-btn-del"
          title="Delete image"
          aria-label="Delete ${esc(item.name)}"
          data-filename="${esc(item.name)}"
          data-sha="${esc(item.sha)}"
        >
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </button>

      </div>

      <!-- Filename strip -->
      <div class="g-name">${esc(item.name)}</div>
    `;

    /* Open lightbox on card click (not on action buttons) */
    card.addEventListener('click', e => {
      if (e.target.closest('.g-btn')) return;
      openLightbox(item.download_url, item.name);
    });

    /* Copy button */
    card.querySelector('.g-btn-copy').addEventListener('click', e => {
      e.stopPropagation();
      const btn = e.currentTarget;
      copyURL(btn.dataset.url, btn);
    });

    /* Delete button */
    card.querySelector('.g-btn-del').addEventListener('click', e => {
      e.stopPropagation();
      openDelModal(e.currentTarget.dataset.filename, e.currentTarget.dataset.sha);
    });

    galleryGrid.appendChild(card);
  });
}

/* ═══════════════════════════════════════════════════════
   COPY URL
═══════════════════════════════════════════════════════ */
function copyURL(url, btn) {
  const original = btn.innerHTML;
  const tick = `
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="20 6 9 17 4 12"/>
    </svg>`;

  navigator.clipboard.writeText(url)
    .then(() => {
      btn.innerHTML = tick;
      btn.classList.add('copied');
      showToast('URL copied to clipboard!', 'success');
    })
    .catch(() => {
      /* Fallback for older browsers */
      try {
        const ta = Object.assign(document.createElement('textarea'), {
          value: url, style: 'position:fixed;opacity:0'
        });
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.innerHTML = tick;
        btn.classList.add('copied');
        showToast('URL copied!', 'success');
      } catch {
        showToast('Could not copy — please copy manually.', 'error');
      }
    })
    .finally(() => {
      setTimeout(() => {
        btn.innerHTML = original;
        btn.classList.remove('copied');
      }, 1800);
    });
}

/* ═══════════════════════════════════════════════════════
   DELETE IMAGE  →  GitHub REST API  DELETE
═══════════════════════════════════════════════════════ */
function openDelModal(filename, sha) {
  pendingDelete = { filename, sha };
  delFilename.textContent = filename;
  delModal.classList.add('open');
  delConfirmBtn.focus();
}

function closeDelModal() {
  pendingDelete = null;
  delModal.classList.remove('open');
}

delCancelBtn.addEventListener('click', closeDelModal);
delModal.addEventListener('click', e => { if (e.target === delModal) closeDelModal(); });

delConfirmBtn.addEventListener('click', async () => {
  if (!pendingDelete) return;
  const token = getToken();
  if (!token) {
    showToast('A token is required to delete files.', 'error');
    closeDelModal();
    return;
  }

  const { filename, sha } = pendingDelete;
  const branch = await getDefaultBranch();
  const url = `${API}/repos/${CFG.owner}/${CFG.repo}/contents/${CFG.folder}${filename}`;

  delConfirmBtn.disabled = true;
  delConfirmBtn.innerHTML = `<span class="spinner" style="width:12px;height:12px;border-width:2px"></span> Deleting…`;

  try {
    const res = await fetch(url, {
      method: 'DELETE',
      headers: authHeaders(token),
      body: JSON.stringify({
        message: `Delete ${filename}`,
        sha:     sha,
        branch:  branch,
      }),
    });

    if (res.ok || res.status === 200) {
      showToast(`${filename} deleted.`, 'success');
      closeDelModal();
      fetchGallery();
    } else {
      const data = await res.json();
      showToast(`Delete failed: ${data.message || 'Unknown error'}`, 'error');
    }
  } catch (err) {
    showToast('Network error during delete.', 'error');
  } finally {
    delConfirmBtn.disabled = false;
    delConfirmBtn.textContent = 'Delete';
  }
});

/* ═══════════════════════════════════════════════════════
   LIGHTBOX
═══════════════════════════════════════════════════════ */
function openLightbox(src, name) {
  lbImg.src        = src;
  lbImg.alt        = name;
  lbFilename.textContent = name;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
  lbClose.focus();
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
  lbImg.src = '';
}

lbClose.addEventListener('click', closeLightbox);
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLightbox(); closeDelModal(); }
});

/* ═══════════════════════════════════════════════════════
   TOAST NOTIFICATIONS
═══════════════════════════════════════════════════════ */
const ICONS = { success: '✓', error: '✕', info: '→' };

function showToast(msg, type = 'info', ms = 3600) {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.setAttribute('role', 'alert');
  el.innerHTML = `<span class="toast-icon">${ICONS[type] ?? '•'}</span><span>${esc(msg)}</span>`;
  $('toastWrap').appendChild(el);

  setTimeout(() => {
    el.classList.add('out');
    el.addEventListener('animationend', () => el.remove(), { once: true });
  }, ms);
}

/* ═══════════════════════════════════════════════════════
   API HEADERS HELPER
═══════════════════════════════════════════════════════ */
function authHeaders(token) {
  return {
    'Authorization':      `Bearer ${token}`,
    'Content-Type':       'application/json',
    'X-GitHub-Api-Version': '2022-11-28',
  };
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
refreshTokenUI();
fetchGallery();
</script>
</body>
</html>
